version: 2
updates:
  # Keep each project's Docker base images patched automatically. Dependabot
  # opens a PR bumping the FROM tag whenever a newer version is available,
  # which also resolves most vulnerabilities Trivy/Docker Scout would flag.
  - package-ecosystem: "docker"
    directory: "/project1"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker)"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/project2"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker)"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/project3"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker)"
    labels:
      - "dependencies"
      - "docker"
