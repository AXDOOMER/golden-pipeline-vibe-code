name: Golden Pipeline - Python

# Reusable "golden pipeline" for the Python stack (project3).
# Called by .github/workflows/ci.yml once per changed/published project.
#
# Rule mapping (see README.md "Design for vibe code pipeline"):
#  - "build should fail if a dependency lockfile is missing"        -> verify-lockfile (requirements.txt is the pinned manifest)
#  - "a modern linter should be used with Python, like Ruff"        -> lint-test-audit (ruff check)
#  - "CodeQL is used for code scanning, but semgrep can also be"    -> codeql + semgrep jobs
#  - "docker files are allowed to be deployed with vulnerabilities" -> trivy scan uses exit-code 0 (report only)
#  - "uploaded to the container registry after a commit on main"   -> docker-build-scan-publish (publish=true, tag=latest)
#  - "when a tag is created, an image with the corresponding tag"  -> docker-build-scan-publish (publish=true, tag=<version>)
#  - "if the image version already exists, developer is informed"  -> "Check whether tag already exists" step

on:
  workflow_call:
    inputs:
      project-path:
        description: Path to the project directory (also the Docker build context)
        required: true
        type: string
      project-name:
        description: Short name used for the container image, job labels and SARIF categories
        required: true
        type: string
      publish:
        description: Whether this run should build and push the Docker image
        required: false
        type: boolean
        default: false
      image-tag:
        description: Tag to publish the image as ("latest" for main, or a version for a release tag)
        required: false
        type: string
        default: ''
    secrets:
      DOCKERHUB_USERNAME:
        description: Docker Hub username, required only for the optional Docker Scout steps
        required: false
      DOCKERHUB_TOKEN:
        description: Docker Hub access token, required only for the optional Docker Scout steps
        required: false

permissions:
  contents: read

jobs:
  verify-lockfile:
    name: Verify requirements.txt exists
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Fail if requirements.txt is missing
        run: |
          set -euo pipefail
          if [ ! -f "${{ inputs.project-path }}/requirements.txt" ]; then
            echo "::error::Missing ${{ inputs.project-path }}/requirements.txt - builds must be reproducible from pinned dependencies."
            exit 1
          fi
          echo "Dependency manifest present: ${{ inputs.project-path }}/requirements.txt"

  lint-test-audit:
    name: Install, lint & audit
    needs: verify-lockfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ inputs.project-path }}/requirements.txt
      - name: Install dependencies
        working-directory: ${{ inputs.project-path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with Ruff (non-compiled Python must be linted)
        run: |
          pip install ruff==0.15.22
          ruff check "${{ inputs.project-path }}"
      - name: pip-audit (defense in depth; the PR-blocking gate is dependency-review)
        continue-on-error: true
        run: |
          pip install pip-audit==2.10.1
          pip-audit -r "${{ inputs.project-path }}/requirements.txt"

  codeql:
    name: CodeQL analysis
    needs: verify-lockfile
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          languages: python
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          category: /language:python-${{ inputs.project-name }}

  semgrep:
    name: Semgrep (supplementary SAST)
    needs: verify-lockfile
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Install semgrep
        run: pip install semgrep==1.170.0
      - name: Run semgrep
        run: |
          semgrep scan --config auto --sarif \
            --output "semgrep-${{ inputs.project-name }}.sarif" \
            "${{ inputs.project-path }}"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: semgrep-${{ inputs.project-name }}.sarif
          category: semgrep-${{ inputs.project-name }}

  docker-build-scan-publish:
    name: Build, scan & (maybe) publish Docker image
    needs: lint-test-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Compute image name
        id: vars
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LC}/${{ inputs.project-name }}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image (local, for scanning)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.project-path }}
          push: false
          load: true
          tags: local/${{ inputs.project-name }}:scan
      # Docker images are allowed to ship with (OS-level) vulnerabilities per README,
      # so this scan reports findings to the Security tab but never fails the build.
      - name: Scan image with Trivy (report only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local/${{ inputs.project-name }}:scan
          format: sarif
          output: trivy-${{ inputs.project-name }}.sarif
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: trivy-${{ inputs.project-name }}.sarif
          category: trivy-${{ inputs.project-name }}
      # Docker Scout needs its own Docker Hub login (independent of the GHCR login
      # below) to query its vulnerability/recommendation database. Skips cleanly if
      # the DOCKERHUB_USERNAME/DOCKERHUB_TOKEN repo secrets haven't been configured.
      - name: Log in to Docker Hub (required for Docker Scout)
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # Reports the vulnerability count and, on PRs, comments with a suggested
      # base-image upgrade to eliminate as many findings as possible.
      - name: Docker Scout - vulnerabilities & suggested base image upgrade
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/scout-action@2688993af7bafd6ba8c6a74ec652442be91dd82b # v1.23.1
        with:
          command: cves,recommendations
          image: local://local/${{ inputs.project-name }}:scan
          only-severities: critical,high
          ignore-unchanged: true
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to GHCR
        if: inputs.publish
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check whether this tag already exists in the registry
        if: inputs.publish && inputs.image-tag != 'latest'
        id: check-tag
        run: |
          IMAGE="${{ steps.vars.outputs.image }}:${{ inputs.image-tag }}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "::warning::$IMAGE already exists in the registry. Skipping publish so an existing release is never overwritten - bump the version if this is meant to be a new release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Push image
        if: inputs.publish && steps.check-tag.outputs.exists != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.project-path }}
          push: true
          tags: ${{ steps.vars.outputs.image }}:${{ inputs.image-tag }}
